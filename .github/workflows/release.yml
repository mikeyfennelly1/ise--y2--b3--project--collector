name: Transactional release of GitHub Source tags and corresponding Docker artifacts

on:
  push:
    branches:
      - main

jobs:
#  Branch protection rules guarantee that any merges to the main line require
#  status checks "pr-checks" before this workflow is dispatched.
#
#  Therefore, it is safe to assume that this workflow has:
#   - Valid semantic versioning history.
#   - Buildable Docker image.
#   -
  check-latest-release-pre-run:
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ''
    steps:
      - name: Get latest release
        run: |
          tag=$(curl -s https://api.github.com/repos/actions/checkout/releases/latest | jq -r .tag_name)
          echo "latest_tag=$tag" >> "$GITHUB_OUTPUT"
  get-head:
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.get_sha.outputs.head_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Get HEAD SHA
        id: get_sha
        run: |
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

########################################################################
# RELEASE
########################################################################

  release--semver-github-repo-release:
    needs:
      - check-latest-release-pre-run
      - get-head
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      - name: Create release via semver
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 18
        env:
          GITHUB_TOKEN: ${{ secrets.GHA_PAT }}
      - name: Print tag name
        run: echo "The new tag is v${{ steps.semantic.outputs.new_release_version }}"

  release--build-and-push-docker-image:
    needs:
      - release--semver-github-repo-release
    if: ${{ needs.release.outputs.tag_name != '' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: v${{ needs.release--semver-github-repo-release.outputs.tag_name }}

      - name: Load values workflow-values.yaml
        id: load_values
        run: |
          echo "DOCKERHUB_USERNAME=$(yq e '.DOCKERHUB_USERNAME' .github/workflow-values.yml)" >> $GITHUB_ENV
          echo "IMAGE_NAME=$(yq e '.IMAGE_NAME' .github/workflow-values.yml)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:v${{ needs.release.outputs.tag_name }}

    outputs:
      tag_name: ${{ steps.semantic.outputs.new_release_version }}

########################################################################
# ROLLBACK
#
# This resets both the GitHub repository and the DockerHub repository
# to their previous state before the 'RELEASE' workflow section.
########################################################################

  rollback--delete-github-repo-tag:
    # this will run if this workflow instance has already released a version
    # of the repo, and it has been deemed necessary to roll back that repo version.


#   The source version must already have been released before a container artifact is released
    needs:
      - check-latest-release-pre-run
      - release--semver-github-repo-release

    runs-on: ubuntu-22.04

#   Only run this step if a new tag was released in this workflow.
    if: ${{ needs.release--semver-github-repo-release.result == 'success' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Rollback repository to previous version
        run: |
          git reset --hard v${{ needs.check-latest-release-pre-run.outputs.tag_name }}
          git log -1  # verify rollback

  rollback--delete-docker-image-release:
    runs-on: ubuntu-22.04
    needs:
      - release--build-and-push-docker-image
    if: ${{ needs.release--build-and-push-docker-image.result == 'success' }}  # <-- only run if docker image has already been released
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Rollback repository to previous version
        run: |
          git reset --hard <COMMIT_HASH>
          git log -1  # verify rollback
