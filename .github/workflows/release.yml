name: Release and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    outputs:
      tag_name: ${{ steps.semantic.outputs.new_release_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      - name: Create release via semver
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 18
        env:
          GITHUB_TOKEN: ${{ secrets.GHA_PAT }}
      - name: Print tag name
        run: echo "The new tag is ${{ steps.semantic.outputs.new_release_tag }}"

  build-and-push:
    needs: release
    if: ${{ needs.release.outputs.tag_name != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Load values workflow-values.yaml
        id: load_values
        run: |
          echo "DOCKERHUB_USERNAME=$(yq e '.DOCKERHUB_USERNAME' .github/workflow-values.yml)" >> $GITHUB_ENV
          echo "IMAGE_NAME=$(yq e '.IMAGE_NAME' .github/workflow-values.yml)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.tag_name }}
